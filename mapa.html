<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GeoField — Mapa / GPS</title>
<meta name="theme-color" content="#1A1A18">
<link rel="manifest" href="manifest.json"><style>:root{--bg:#F2F2F0;--surface:#fff;--border:#D0CFC9;--text:#1A1A18;--text2:#5A5A56;--accent:#E85D20;--blue:#1A5FA8;--radius:12px;--shadow:0 4px 12px rgba(0,0,0,.08)}*{box-sizing:border-box}body{font-family:-apple-system,Segoe UI,system-ui,sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh}.top{background:#1A1A18;color:#fff;padding:18px 18px 16px}.back{border:0;background:#2b2b29;color:#fff;border-radius:10px;padding:10px 14px;font-size:12px;font-weight:800;letter-spacing:.06em;cursor:pointer}.title{font-size:22px;font-weight:800;margin-top:14px}.sub{font-size:13px;color:rgba(255,255,255,.6);margin-top:4px}.wrap{padding:16px 16px 90px}.label{font-size:11px;letter-spacing:.12em;color:#8a8a84;font-weight:800;text-transform:uppercase;margin:8px 0 10px}.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer}.card h3{margin:0 0 5px;font-size:16px}.card p{margin:0;color:var(--text2);font-size:13px}.btn{width:100%;border:0;border-radius:12px;background:var(--accent);color:#fff;font-weight:800;font-size:16px;padding:16px;margin:8px 0;cursor:pointer}.btn.secondary{background:#fff;color:#1A1A18;border:1px solid var(--border)}input,textarea,select{width:100%;padding:14px;border:1px solid var(--border);border-radius:10px;font-size:15px;margin:6px 0 12px;background:#fff}textarea{min-height:90px}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;height:58px;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center}.nav a{text-decoration:none;color:#555;font-size:11px;text-align:center}.row{display:flex;gap:10px}.row>*{flex:1}.pill{display:inline-block;background:#fff5dc;color:#8a5a00;padding:4px 8px;border-radius:99px;font-size:11px;font-weight:700}</style></head><body><div class="top"><button class="back" onclick="history.back()">VOLTAR</button><div class="title">Mapa / GPS</div><div class="sub">Localização da inspeção</div></div><main class="wrap"><div class='card'><h3>📍 GPS atual</h3><p id='gps'>Buscando localização...</p></div><button class='btn' onclick='pegarGPS()'>Atualizar GPS</button><div class='card'><h3>Obra ativa</h3><p id='obra'>Nenhuma obra carregada.</p></div><script>function pegarGPS(){if(!navigator.geolocation){gps.textContent='GPS não disponível';return}navigator.geolocation.getCurrentPosition(p=>{gps.textContent=p.coords.latitude.toFixed(6)+'°, '+p.coords.longitude.toFixed(6)+'°';},()=>gps.textContent='Permissão de GPS negada');}let o=JSON.parse(localStorage.getItem('obraAtiva')||'null');if(o)obra.textContent=o.obra+' • '+o.trecho+' • '+o.estaca;pegarGPS();</script></main><nav class="nav"><a href="index.html">🏠<br>Início</a><a href="historico.html">📋<br>Fichas</a><a href="mapa.html">📍<br>Mapa</a><a href="configuracoes.html">⚙️<br>Config.</a></nav><script src="assets/js/storage.js"></script>
<script src="assets/js/app-init.js"></script>
</body></html>
