<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1A1A18">
<title>GeoField — Login local</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="top">
  <button class="back" onclick="history.back()">VOLTAR</button>
  <div class="title">Login local</div>
  <div class="sub">Identificação para aparecer nos PDFs</div>
</div>
<main class="wrap form-shell">
  <div class="offline-banner"><span data-offline-status>Modo offline pronto</span><span>💾 Local</span></div>
  <section class="form-card">
    <div class="form-card-title"><div><h2>Identifique o laboratorista</h2><p>Não é login online. É apenas a assinatura/identificação local das fichas.</p></div><span class="step-badge">👤</span></div>
    <div class="input-grid two">
      <div class="field"><label for="nome">Nome</label><input id="nome" placeholder="Nome do laboratorista"></div>
      <div class="field"><label for="cargo">Cargo/função</label><input id="cargo" placeholder="Laboratorista"></div>
    </div>
    <div class="input-grid two">
      <div class="field"><label for="empresa">Empresa/laboratório</label><input id="empresa"></div>
      <div class="field"><label for="registro">Registro / matrícula</label><input id="registro"></div>
    </div>
    <div class="field"><label for="email">E-mail</label><input id="email" type="email"></div>
    <button class="btn" onclick="salvarPerfil();location.href='index.html'">Entrar e continuar</button>
  </section>
</main>
<script src="assets/js/storage.js"></script>
<script src="assets/js/app-init.js"></script>
<script src="assets/js/configuracoes.js"></script>
</body>
</html>
