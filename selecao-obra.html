<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GeoField — Seleção de Obra</title>
<meta name="theme-color" content="#1A1A18">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #F2F2F0;
    --surface: #FFFFFF;
    --surface2: #EAEAE7;
    --border: #D0CFC9;
    --text: #1A1A18;
    --text2: #5A5A56;
    --text3: #8A8A84;
    --accent: #E85D20;
    --blue: #1A5FA8;
    --green: #1E7A3C;
    --green-bg: #EAF5EE;
    --green-border: #A8D9B8;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
  }

  .header {
    background: var(--text);
    color: #fff;
    padding: 20px 20px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .btn-back {
    min-width: 78px; height: 40px; padding: 0 12px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.06em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .btn-back:active { background: rgba(255,255,255,0.2); }
  .header-info { flex: 1; }
  .app-name { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 2px; }
  .header-title { font-size: 20px; font-weight: 700; }
  .header-sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 1px; }

  .main { padding: 16px; display: flex; flex-direction: column; gap: 20px; }

  /* PROGRESS */
  .progress-bar {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .progress-steps {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 12px;
  }
  .step {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    flex: 1;
  }
  .step-circle {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    transition: all 0.3s;
  }
  .step-circle.done { background: var(--green); color: #fff; }
  .step-circle.active { background: var(--accent); color: #fff; }
  .step-circle.waiting { background: var(--surface2); color: var(--text3); border: 1.5px solid var(--border); }
  .step-label { font-size: 10px; font-weight: 600; color: var(--text3); text-align: center; }
  .step-label.active { color: var(--accent); }
  .step-line { flex: 1; height: 2px; background: var(--border); margin-bottom: 16px; transition: background 0.3s; }
  .step-line.done { background: var(--green); }

  /* FORM */
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
  }
  .field-group { display: flex; flex-direction: column; gap: 12px; }
  .field {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .field.active { border-color: var(--blue); }
  .field.filled { border-color: var(--green); }
  
  .field-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .field-label .required { color: var(--accent); }
  
  /* NOVO CSS PARA INPUT DE TEXTO */
  .field-input {
    width: 100%; background: none; border: none; outline: none;
    font-size: 16px; font-weight: 600; color: var(--text);
    font-family: inherit;
  }
  .field-input::placeholder {
    color: var(--text3);
    font-weight: 500;
  }

  /* RESUMO */
  .resumo-card {
    background: var(--surface);
    border: 1.5px solid var(--green-border);
    border-radius: var(--radius);
    padding: 16px;
    display: none;
  }
  .resumo-card.visible { display: block; }
  .resumo-title { font-size: 12px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .resumo-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .resumo-row:last-child { border-bottom: none; }
  .resumo-key { font-size: 12px; color: var(--text3); }
  .resumo-val { font-size: 13px; font-weight: 700; color: var(--text); text-align: right; max-width: 60%; }

  /* BOTÃO CONFIRMAR */
  .btn-confirmar {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    height: 64px;
    width: 100%;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background 0.15s, opacity 0.2s;
    margin-top: 4px;
  }
  .btn-confirmar:disabled { opacity: 0.35; pointer-events: none; }
  .btn-confirmar:active { background: #C44A14; }

  /* INFO CHIP */
  .info-chip {
    background: #EEF4FF;
    border: 1.5px solid #BDD3F8;
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .info-chip-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .info-chip-text { font-size: 13px; color: #1A5FA8; line-height: 1.45; }
  .info-chip-text strong { font-weight: 700; }
</style>
</head>
<body>

<header class="header">
  <button class="btn-back" onclick="history.back()">VOLTAR</button>
  <div class="header-info">
    <div class="app-name">GeoField</div>
    <div class="header-title">Selecionar obra</div>
    <div class="header-sub">Passo 1 de 3</div>
  </div>
</header>

<main class="main">

  <div class="progress-bar">
    <div class="progress-steps">
      <div class="step">
        <div class="step-circle active" id="circ1">1</div>
        <div class="step-label active">Obra</div>
      </div>
      <div class="step-line" id="line1"></div>
      <div class="step">
        <div class="step-circle waiting" id="circ2">2</div>
        <div class="step-label" id="lbl2">Módulo</div>
      </div>
      <div class="step-line" id="line2"></div>
      <div class="step">
        <div class="step-circle waiting" id="circ3">3</div>
        <div class="step-label" id="lbl3">Ensaio</div>
      </div>
    </div>
  </div>

  <div class="info-chip">
    <div class="info-chip-icon">💡</div>
    <div class="info-chip-text">
      <strong>Preencha os dados da obra.</strong>
      Digite as informações de localização para prosseguir com o ensaio.
    </div>
  </div>

  <section>
    <div class="section-label">Localização do ensaio</div>
    <div class="field-group">

      <div class="field active" id="f-cliente">
        <div class="field-label">Cliente <span class="required">*</span></div>
        <input type="text" class="field-input" id="in-cliente" placeholder="Ex: DNIT, Prefeitura..." oninput="checkInput('cliente')">
      </div>

      <div class="field" id="f-obra">
        <div class="field-label">Obra / Contrato <span class="required">*</span></div>
        <input type="text" class="field-input" id="in-obra" placeholder="Ex: BR-163, Galpão..." oninput="checkInput('obra')">
      </div>

      <div class="field" id="f-trecho">
        <div class="field-label">Trecho / Lote <span class="required">*</span></div>
        <input type="text" class="field-input" id="in-trecho" placeholder="Ex: Lote 4A, Bloco B..." oninput="checkInput('trecho')">
      </div>

      <div class="field" id="f-estaca">
        <div class="field-label">Estaca / Km <span class="required">*</span></div>
        <input type="text" class="field-input" id="in-estaca" placeholder="Ex: Est. 238+00, km 180..." oninput="checkInput('estaca')">
      </div>

    </div>
  </section>

  <div class="resumo-card" id="resumo">
    <div class="resumo-title">✔ Localização confirmada</div>
    <div class="resumo-row">
      <span class="resumo-key">Cliente</span>
      <span class="resumo-val" id="r-cliente">—</span>
    </div>
    <div class="resumo-row">
      <span class="resumo-key">Obra</span>
      <span class="resumo-val" id="r-obra">—</span>
    </div>
    <div class="resumo-row">
      <span class="resumo-key">Trecho</span>
      <span class="resumo-val" id="r-trecho">—</span>
    </div>
    <div class="resumo-row">
      <span class="resumo-key">Estaca</span>
      <span class="resumo-val" id="r-estaca">—</span>
    </div>
  </div>

  <button class="btn-confirmar" id="btn-confirmar" disabled onclick="confirmar()">
    Confirmar e escolher módulo →
  </button>

</main>

<script>
function checkInput(fieldId) {
  const input = document.getElementById('in-' + fieldId);
  const div = document.getElementById('f-' + fieldId);
  
  // Se o campo tiver texto, fica verde (filled). Se estiver vazio, volta a ficar com borda azul ou cinza.
  if (input.value.trim() !== '') {
    div.className = 'field filled';
  } else {
    div.className = 'field active';
  }
  
  checkComplete();
}

function checkComplete() {
  const c = document.getElementById('in-cliente').value.trim();
  const o = document.getElementById('in-obra').value.trim();
  const t = document.getElementById('in-trecho').value.trim();
  const e = document.getElementById('in-estaca').value.trim();

  const resumo = document.getElementById('resumo');
  const btn = document.getElementById('btn-confirmar');

  // Só mostra o resumo e libera o botão se os 4 campos tiverem sido preenchidos
  if (c && o && t && e) {
    document.getElementById('r-cliente').textContent = c;
    document.getElementById('r-obra').textContent = o;
    document.getElementById('r-trecho').textContent = t;
    document.getElementById('r-estaca').textContent = e;
    resumo.classList.add('visible');
    btn.disabled = false;
  } else {
    resumo.classList.remove('visible');
    btn.disabled = true;
  }
}

function salvarObraAtiva(){
  const c = document.getElementById('in-cliente').value.trim();
  const o = document.getElementById('in-obra').value.trim();
  const t = document.getElementById('in-trecho').value.trim();
  const e = document.getElementById('in-estaca').value.trim();

  const obra = {
    cliente: c, 
    obra: o, 
    trecho: t, 
    estaca: e, 
    data: new Date().toISOString()
  };
  localStorage.setItem('obraAtiva', JSON.stringify(obra));
}

function confirmar() {
  // Avança progresso visualmente (opcional, já que vai mudar de tela)
  document.getElementById('circ1').className = 'step-circle done';
  document.getElementById('circ1').textContent = '✓';
  document.getElementById('line1').className = 'step-line done';
  document.getElementById('circ2').className = 'step-circle active';
  document.getElementById('lbl2').className = 'step-label active';
  
  salvarObraAtiva(); 
  window.location.href = 'nova-inspecao.html';
}
</script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/app-init.js"></script>
</body>
</html>
